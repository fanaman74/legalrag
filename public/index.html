<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legal RAG — Document Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- ═══════════════════ INGEST MODAL ═══════════════════ -->
<div id="ingestModal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
  <!-- Panel -->
  <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 flex flex-col max-h-[80vh]">
    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
      <div>
        <h2 class="text-base font-bold text-gray-800">Ingesting Documents</h2>
        <p id="modalProgress" class="text-xs text-gray-400 mt-0.5">Preparing…</p>
      </div>
      <div id="modalSpinner" class="w-6 h-6 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
    </div>
    <!-- Progress bar -->
    <div class="px-6 pt-3 pb-1">
      <div class="h-1.5 bg-gray-100 rounded-full overflow-hidden">
        <div id="modalBar" class="h-full bg-blue-500 rounded-full transition-all duration-300" style="width:0%"></div>
      </div>
    </div>
    <!-- File list -->
    <div id="modalFileList" class="flex-1 overflow-y-auto px-6 py-3 space-y-1.5"></div>
    <!-- Footer -->
    <div class="px-6 py-4 border-t border-gray-100 flex items-center justify-between">
      <p id="modalSummary" class="text-xs text-gray-400"></p>
      <button id="modalClose" class="hidden bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-5 py-2 rounded-lg transition">
        Done
      </button>
    </div>
  </div>
</div>

<!-- ═══════════════════ LOGIN ═══════════════════ -->
<div id="loginView" class="min-h-screen flex items-center justify-center">
  <div class="bg-white shadow-md rounded-2xl p-8 w-full max-w-sm">
    <h1 class="text-2xl font-bold text-gray-800 mb-1 text-center">Legal RAG</h1>
    <p class="text-sm text-gray-400 text-center mb-6">Document Manager</p>
    <form id="loginForm">
      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input id="loginPassword" type="password" required autocomplete="current-password"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 mb-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      <div id="loginError" class="text-red-600 text-sm mb-3 hidden"></div>
      <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg text-sm transition">
        Login
      </button>
    </form>
  </div>
</div>

<!-- ═══════════════════ MAIN APP ═══════════════════ -->
<div id="mainApp" class="hidden min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between shrink-0">
    <h1 class="text-lg font-bold text-gray-800">Legal RAG — Document Manager</h1>
    <button id="logoutBtn" class="text-sm text-gray-400 hover:text-red-600 transition">Logout</button>
  </header>

  <!-- Tab bar -->
  <div class="bg-white border-b border-gray-200 px-6 shrink-0">
    <nav class="flex gap-6">
      <button data-tab="upload"    class="tab-btn py-3 text-sm font-medium">Upload</button>
      <button data-tab="documents" class="tab-btn py-3 text-sm font-medium">Documents</button>
      <button data-tab="search"    class="tab-btn py-3 text-sm font-medium">Search</button>
    </nav>
  </div>

  <!-- Content -->
  <main class="flex-1 overflow-auto">
    <div class="max-w-5xl mx-auto px-6 py-8">

      <!-- ─── UPLOAD TAB ─── -->
      <div id="tab-upload">

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-4">
          <!-- Hidden inputs — triggered by labels below -->
          <input id="fileInput"   type="file" multiple accept=".pdf,.docx,.txt,.md,.eml,.msg"
            class="sr-only" />
          <input id="folderInput" type="file" webkitdirectory multiple
            class="sr-only" />

          <!-- Mode buttons as labels — most reliable cross-browser trigger -->
          <div class="flex gap-2 mb-4">
            <label for="fileInput"
              class="px-4 py-1.5 rounded-full text-sm font-medium cursor-pointer transition select-none
                     bg-blue-600 text-white hover:bg-blue-700" id="modeFilesLbl">
              📄 Files
            </label>
            <label for="folderInput"
              class="px-4 py-1.5 rounded-full text-sm font-medium cursor-pointer transition select-none
                     bg-gray-100 text-gray-600 hover:bg-gray-200" id="modeFolderLbl">
              📁 Folder
            </label>
          </div>

          <!-- Drop zone (drag-drop still works) -->
          <div id="dropZone"
            class="border-2 border-dashed border-gray-300 rounded-xl p-10 text-center hover:border-blue-400 hover:bg-blue-50 transition">
            <p class="text-gray-500 text-sm">Or drag &amp; drop files / folders here</p>
            <p class="text-xs text-gray-400 mt-1">PDF · DOCX · TXT · MD · EML · MSG</p>
          </div>

          <p id="selectedCount"  class="mt-2 text-sm text-gray-500 hidden"></p>
          <p id="skippedCount"  class="mt-1 text-xs text-amber-500 hidden"></p>
          <p id="folderDetected" class="mt-1 text-xs text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg hidden"></p>
        </div>

        <button id="uploadBtn" disabled
          class="bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-medium px-6 py-2.5 rounded-lg text-sm transition">
          Upload &amp; Ingest
        </button>

        <div id="progressList" class="mt-6 space-y-2 hidden"></div>
      </div>

      <!-- ─── DOCUMENTS TAB ─── -->
      <div id="tab-documents" class="hidden">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-base font-semibold text-gray-800">Indexed Documents</h2>
          <button id="refreshDocsBtn" class="text-sm text-blue-600 hover:text-blue-800">↻ Refresh</button>
        </div>

        <!-- Filters -->
        <div class="bg-white rounded-xl border border-gray-200 px-4 py-3 mb-4 flex flex-wrap gap-3 items-end">
          <div>
            <label class="block text-xs font-medium text-gray-500 mb-1">Source Type</label>
            <select id="docsFilterType" class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm">
              <option value="">All types</option>
              <option value="olaf_complaint">OLAF Complaint</option>
              <option value="general_court">General Court</option>
              <option value="ias_audit">IAS Audit</option>
              <option value="ep_discharge">EP Discharge</option>
              <option value="correspondence">Correspondence</option>
              <option value="staff_regulations">Staff Regulations</option>
              <option value="decision">Decision</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-500 mb-1">Case Number</label>
            <input id="docsFilterCase" type="text" placeholder="e.g. T-777/25"
              class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm w-36" />
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-500 mb-1">Date</label>
            <input id="docsFilterDate" type="text" placeholder="e.g. 2024"
              class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm w-28" />
          </div>
          <button id="docsClearFilters" class="text-xs text-gray-400 hover:text-gray-600 pb-1.5">Clear</button>
          <span id="docsFilterCount" class="text-xs text-gray-400 pb-1.5 ml-auto hidden"></span>
        </div>

        <div id="docsContent">
          <p class="text-gray-400 text-sm">Loading...</p>
        </div>
      </div>

      <!-- ─── SEARCH TAB ─── -->
      <div id="tab-search" class="hidden">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
          <div class="flex gap-3 mb-4">
            <input id="searchQuery" type="text" placeholder="Search your legal documents..."
              class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
            <button id="searchBtn"
              class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-5 py-2 rounded-lg text-sm transition shrink-0">
              Search
            </button>
          </div>

          <details class="text-sm">
            <summary class="text-gray-400 cursor-pointer select-none hover:text-gray-600">Filters</summary>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-3">
              <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">Source Type</label>
                <select id="searchSourceType" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                  <option value="">All types</option>
                  <option value="olaf_complaint">OLAF Complaint</option>
                  <option value="general_court">General Court</option>
                  <option value="ias_audit">IAS Audit</option>
                  <option value="ep_discharge">EP Discharge</option>
                  <option value="correspondence">Correspondence</option>
                  <option value="staff_regulations">Staff Regulations</option>
                  <option value="decision">Decision</option>
                  <option value="other">Other</option>
                </select>
              </div>
              <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">Case Number</label>
                <input id="searchCaseNumber" type="text" placeholder="e.g. T-777/25"
                  class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" />
              </div>
              <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">
                  Threshold: <span id="thresholdVal">0.60</span>
                </label>
                <input id="searchThreshold" type="range" min="0.50" max="1.00" step="0.05" value="0.60"
                  class="w-full accent-blue-600" />
              </div>
              <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">Max Results</label>
                <input id="searchLimit" type="number" min="1" max="20" value="8"
                  class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" />
              </div>
            </div>
          </details>
        </div>

        <div id="searchResults"></div>
      </div>

    </div>
  </main>
</div>

<script>
// ════════════════════════════════════════════════
//  Auth
// ════════════════════════════════════════════════
const getToken   = () => localStorage.getItem('rag_token');
const setToken   = t  => localStorage.setItem('rag_token', t);
const clearToken = () => localStorage.removeItem('rag_token');

async function apiFetch(path, opts = {}) {
  const res = await fetch(path, opts);
  if (res.status === 401) { clearToken(); showLogin(); return null; }
  return res;
}

function authHdr() {
  return { 'Authorization': `Bearer ${getToken()}` };
}

// ════════════════════════════════════════════════
//  Views
// ════════════════════════════════════════════════
function showLogin() {
  document.getElementById('loginView').classList.remove('hidden');
  document.getElementById('mainApp').classList.add('hidden');
}

function showApp() {
  document.getElementById('loginView').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  switchTab('upload');
}

// ════════════════════════════════════════════════
//  Login
// ════════════════════════════════════════════════
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const password = document.getElementById('loginPassword').value;
  const errEl    = document.getElementById('loginError');
  errEl.classList.add('hidden');

  const res  = await fetch('/api/auth', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ password }),
  });
  const data = await res.json();

  if (!res.ok) {
    errEl.textContent = data.error || 'Login failed';
    errEl.classList.remove('hidden');
    return;
  }
  setToken(data.token);
  showApp();
});

document.getElementById('logoutBtn').addEventListener('click', () => {
  clearToken();
  showLogin();
});

// ════════════════════════════════════════════════
//  Tabs
// ════════════════════════════════════════════════
function switchTab(name) {
  ['upload', 'documents', 'search'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('hidden', t !== name);
  });
  document.querySelectorAll('.tab-btn').forEach(btn => {
    const active = btn.dataset.tab === name;
    btn.classList.toggle('border-b-2',      active);
    btn.classList.toggle('border-blue-600', active);
    btn.classList.toggle('text-blue-600',   active);
    btn.classList.toggle('text-gray-500',  !active);
  });
  if (name === 'documents') loadDocuments();
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// ════════════════════════════════════════════════
//  Upload tab
// ════════════════════════════════════════════════
const ALLOWED_EXTS = new Set(['.pdf', '.docx', '.txt', '.md', '.eml', '.msg']);
let selectedFiles  = [];
let batchMeta      = { sourceType: 'other', caseNumber: '', date: '', language: 'en' };

function extOf(name) { return name.slice(name.lastIndexOf('.')).toLowerCase(); }

// ── Folder name → metadata detection ─────────────────────────────────────────
function parseFolderMetadata(folderName) {
  const s = folderName.toLowerCase().replace(/[-_\s]+/g, '_');
  const result = {};

  // Source type
  if      (s.includes('olaf'))                         result.sourceType = 'olaf_complaint';
  else if (s.includes('general_court') || s.includes('gcourt') || s.includes('tribunal')) result.sourceType = 'general_court';
  else if (s.includes('ias') || s.includes('audit'))   result.sourceType = 'ias_audit';
  else if (s.includes('discharge') || s.includes('ep_discharge')) result.sourceType = 'ep_discharge';
  else if (s.includes('correspondence') || s.includes('email') || s.includes('mail')) result.sourceType = 'correspondence';
  else if (s.includes('staff_reg') || s.includes('staffreg')) result.sourceType = 'staff_regulations';
  else if (s.includes('decision'))                     result.sourceType = 'decision';

  // Case number — e.g. T-777-25, T777-25, F-123-24 (folders use dash instead of slash)
  const caseMatch = folderName.match(/(?:^|[_\-\s])([TFC]-?\d+[-\/]\d{2,4})(?:[_\-\s]|$)/i);
  if (caseMatch) result.caseNumber = caseMatch[1].replace(/(\d+)-(\d{2,4})$/, '$1/$2').toUpperCase();

  // Date — YYYY-MM-DD or YYYY_MM_DD (not preceded/followed by another digit)
  const dateMatch = folderName.match(/(?<!\d)(\d{4})[_-](\d{2})[_-](\d{2})(?!\d)/);
  if (dateMatch) result.date = `${dateMatch[1]}-${dateMatch[2]}-${dateMatch[3]}`;

  // Language
  if      (/[_\-\s]fr[_\-\s\.]|french|français/i.test(folderName)) result.language = 'fr';
  else if (/[_\-\s]en[_\-\s\.]|english/i.test(folderName))         result.language = 'en';

  return result;
}

function applyFolderMetadata(files) {
  if (!files.length) return;
  const firstPath  = files[0].webkitRelativePath || '';
  const folderName = firstPath.split('/')[0];
  if (!folderName) return;

  const meta    = parseFolderMetadata(folderName);
  const detectedEl = document.getElementById('folderDetected');

  if (Object.keys(meta).length === 0) {
    detectedEl.classList.add('hidden');
    return;
  }

  // Store detected values
  batchMeta = {
    sourceType: meta.sourceType || 'other',
    caseNumber: meta.caseNumber || '',
    date:       meta.date       || '',
    language:   meta.language   || 'en',
  };

  // Show hint
  const parts = [];
  if (meta.sourceType) parts.push(meta.sourceType.replace(/_/g, ' '));
  if (meta.caseNumber) parts.push(meta.caseNumber);
  if (meta.date)       parts.push(meta.date);
  if (meta.language)   parts.push(meta.language.toUpperCase());
  detectedEl.textContent = `Detected from "${folderName}": ${parts.join(' · ')}`;
  detectedEl.classList.remove('hidden');
}

function refreshFileUI() {
  const countEl   = document.getElementById('selectedCount');
  const uploadBtn = document.getElementById('uploadBtn');

  uploadBtn.disabled = selectedFiles.length === 0;

  if (selectedFiles.length === 0) {
    countEl.classList.add('hidden');
    return;
  }
  countEl.classList.remove('hidden');
  countEl.textContent = `${selectedFiles.length} file(s) selected`;

  // Auto-set correspondence when ALL files are email types
  const allEmail = selectedFiles.every(f => ['.eml', '.msg'].includes(extOf(f.name)));
  if (allEmail) batchMeta.sourceType = 'correspondence';
}

function applyFiles(files) {
  const all     = Array.from(files);
  selectedFiles = all.filter(f => ALLOWED_EXTS.has(extOf(f.name)));
  const skipped = all.length - selectedFiles.length;

  const skippedEl = document.getElementById('skippedCount');
  if (skipped > 0) {
    skippedEl.textContent = `${skipped} file${skipped !== 1 ? 's' : ''} skipped (unsupported format)`;
    skippedEl.classList.remove('hidden');
  } else {
    skippedEl.classList.add('hidden');
  }
  refreshFileUI();
}

const fileInput   = document.getElementById('fileInput');
const folderInput = document.getElementById('folderInput');
const dropZone    = document.getElementById('dropZone');

// Inputs are triggered directly by <label for="..."> — no JS click() needed.
// Clear state when a new selection is made.
fileInput.addEventListener('change', () => {
  selectedFiles = [];
  batchMeta     = { sourceType: 'other', caseNumber: '', date: '', language: 'en' };
  document.getElementById('folderDetected').classList.add('hidden');
  applyFiles(fileInput.files);
});
folderInput.addEventListener('change', () => {
  selectedFiles = [];
  batchMeta     = { sourceType: 'other', caseNumber: '', date: '', language: 'en' };
  applyFiles(folderInput.files);
  applyFolderMetadata(Array.from(folderInput.files));
});
dropZone.addEventListener('dragover',  e  => { e.preventDefault(); dropZone.classList.add('border-blue-400', 'bg-blue-50'); });
dropZone.addEventListener('dragleave',     () => dropZone.classList.remove('border-blue-400', 'bg-blue-50'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('border-blue-400', 'bg-blue-50');
  applyFiles(e.dataTransfer.files);
});

// ── Modal helpers ─────────────────────────────────────────
function openModal() {
  document.getElementById('ingestModal').classList.remove('hidden');
  document.getElementById('modalFileList').innerHTML = '';
  document.getElementById('modalBar').style.width = '0%';
  document.getElementById('modalProgress').textContent = 'Preparing…';
  document.getElementById('modalSummary').textContent = '';
  document.getElementById('modalClose').classList.add('hidden');
  document.getElementById('modalSpinner').classList.remove('hidden');
}
function closeModal() {
  document.getElementById('ingestModal').classList.add('hidden');
}
document.getElementById('modalClose').addEventListener('click', closeModal);

document.getElementById('uploadBtn').addEventListener('click', async () => {
  if (selectedFiles.length === 0) return;

  const { sourceType, caseNumber, date: docDate, language } = batchMeta;

  document.getElementById('uploadBtn').disabled = true;
  openModal();

  const total     = selectedFiles.length;
  const fileList  = document.getElementById('modalFileList');
  const bar       = document.getElementById('modalBar');
  const progress  = document.getElementById('modalProgress');

  // Pre-populate all rows as pending
  const rows = selectedFiles.map(file => {
    const isEmail = ['.eml', '.msg'].includes(extOf(file.name));
    const row = document.createElement('div');
    row.className = 'flex items-center gap-3 text-sm py-2 px-3 rounded-lg';
    row.innerHTML = `
      <span class="text-base shrink-0">${isEmail ? '📧' : '📄'}</span>
      <span class="flex-1 text-gray-700 truncate text-xs" title="${file.name}">${file.name}</span>
      <span class="status text-gray-300 shrink-0 text-xs">Waiting…</span>
    `;
    fileList.appendChild(row);
    return { file, statusEl: row.querySelector('.status'), row };
  });

  let done = 0, succeeded = 0, failed = 0;

  for (const { file, statusEl, row } of rows) {
    // Mark as active
    row.classList.add('bg-blue-50');
    statusEl.textContent  = 'Ingesting…';
    statusEl.className    = 'status text-blue-500 shrink-0 text-xs animate-pulse';
    row.scrollIntoView({ block: 'nearest' });
    progress.textContent  = `File ${done + 1} of ${total} — ${file.name}`;

    try {
      const fd = new FormData();
      fd.append('file', file, file.name);
      fd.append('source_type', sourceType);
      if (caseNumber) fd.append('case_number', caseNumber);
      if (docDate)    fd.append('document_date', docDate);
      fd.append('language', language);

      const res  = await fetch('/api/ingest', { method: 'POST', headers: authHdr(), body: fd });
      const data = await res.json();

      row.classList.remove('bg-blue-50');
      if (!res.ok) {
        row.classList.add('bg-red-50');
        statusEl.textContent = `✗ ${data.error}`;
        statusEl.className   = 'status text-red-500 shrink-0 text-xs';
        failed++;
      } else {
        row.classList.add('bg-green-50');
        statusEl.textContent = `✓ ${data.chunksCreated} chunks`;
        statusEl.className   = 'status text-green-600 shrink-0 text-xs font-medium';
        succeeded++;
      }
    } catch {
      row.classList.remove('bg-blue-50');
      row.classList.add('bg-red-50');
      statusEl.textContent = '✗ Network error';
      statusEl.className   = 'status text-red-500 shrink-0 text-xs';
      failed++;
    }

    done++;
    bar.style.width = `${Math.round((done / total) * 100)}%`;
  }

  // Finished
  document.getElementById('modalSpinner').classList.add('hidden');
  progress.textContent = `Complete — ${total} file${total !== 1 ? 's' : ''} processed`;
  document.getElementById('modalSummary').textContent =
    `${succeeded} succeeded${failed ? ', ' + failed + ' failed' : ''}`;
  document.getElementById('modalClose').classList.remove('hidden');
  bar.classList.replace('bg-blue-500', failed > 0 ? 'bg-yellow-400' : 'bg-green-500');

  selectedFiles = []; batchMeta = { sourceType: 'other', caseNumber: '', date: '', language: 'en' };
  fileInput.value = ''; folderInput.value = '';
  document.getElementById('folderDetected').classList.add('hidden');
  refreshFileUI();
});

// ════════════════════════════════════════════════
//  Documents tab
// ════════════════════════════════════════════════
let allDocs = [];

function renderDocuments() {
  const filterType = document.getElementById('docsFilterType').value;
  const filterCase = document.getElementById('docsFilterCase').value.trim().toLowerCase();
  const filterDate = document.getElementById('docsFilterDate').value.trim();
  const content    = document.getElementById('docsContent');
  const countEl    = document.getElementById('docsFilterCount');

  const filtered = allDocs.filter(doc => {
    if (filterType && doc.source_type !== filterType) return false;
    if (filterCase && !(doc.case_number || '').toLowerCase().includes(filterCase)) return false;
    if (filterDate && !(doc.document_date || '').includes(filterDate)) return false;
    return true;
  });

  const isFiltered = filterType || filterCase || filterDate;
  if (isFiltered) {
    countEl.textContent = `${filtered.length} of ${allDocs.length} shown`;
    countEl.classList.remove('hidden');
  } else {
    countEl.classList.add('hidden');
  }

  if (filtered.length === 0) {
    content.innerHTML = allDocs.length === 0
      ? '<p class="text-gray-400 text-sm">No documents indexed yet. Upload some documents to get started.</p>'
      : '<p class="text-gray-400 text-sm">No documents match the current filters.</p>';
    return;
  }

  content.innerHTML = `
    <div class="overflow-x-auto rounded-xl border border-gray-200">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 text-gray-500 text-xs uppercase">
          <tr>
            <th class="px-4 py-3 text-left">ID</th>
            <th class="px-4 py-3 text-left">Filename</th>
            <th class="px-4 py-3 text-left">Type</th>
            <th class="px-4 py-3 text-left">Case</th>
            <th class="px-4 py-3 text-left">Date</th>
            <th class="px-4 py-3 text-left">Chunks</th>
            <th class="px-4 py-3 text-left"></th>
          </tr>
        </thead>
        <tbody id="docsTableBody" class="bg-white divide-y divide-gray-100"></tbody>
      </table>
    </div>
  `;

  const tbody = document.getElementById('docsTableBody');
  filtered.forEach(doc => {
    const tr = document.createElement('tr');
    tr.className = 'hover:bg-gray-50';
    tr.innerHTML = `
      <td class="px-4 py-3 text-gray-400">${doc.id}</td>
      <td class="px-4 py-3 font-medium text-gray-800 max-w-xs">
        <span class="block truncate" title="${doc.filename}">${doc.filename}</span>
      </td>
      <td class="px-4 py-3">
        <span class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full">${doc.source_type.replace(/_/g, ' ')}</span>
      </td>
      <td class="px-4 py-3 text-gray-500">${doc.case_number   || '<span class="text-gray-300">n/a</span>'}</td>
      <td class="px-4 py-3 text-gray-500">${doc.document_date || '<span class="text-gray-300">n/a</span>'}</td>
      <td class="px-4 py-3 text-gray-500">${doc.total_chunks}</td>
      <td class="px-4 py-3">
        <button class="delete-btn text-xs font-medium text-red-500 hover:text-red-700"
          data-id="${doc.id}" data-name="${doc.filename}">Delete</button>
      </td>
    `;
    tbody.appendChild(tr);
  });

  tbody.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm(`Delete "${btn.dataset.name}" and all its chunks? This cannot be undone.`)) return;
      const res = await apiFetch(`/api/documents/${btn.dataset.id}`, {
        method:  'DELETE',
        headers: authHdr(),
      });
      if (res) loadDocuments();
    });
  });
}

async function loadDocuments() {
  const content = document.getElementById('docsContent');
  content.innerHTML = '<p class="text-gray-400 text-sm">Loading…</p>';

  const res = await apiFetch('/api/documents', { headers: authHdr() });
  if (!res) return;

  allDocs = await res.json();
  renderDocuments();
}

document.getElementById('refreshDocsBtn').addEventListener('click', loadDocuments);
document.getElementById('docsFilterType').addEventListener('change', renderDocuments);
document.getElementById('docsFilterCase').addEventListener('input',  renderDocuments);
document.getElementById('docsFilterDate').addEventListener('input',  renderDocuments);
document.getElementById('docsClearFilters').addEventListener('click', () => {
  document.getElementById('docsFilterType').value = '';
  document.getElementById('docsFilterCase').value = '';
  document.getElementById('docsFilterDate').value = '';
  renderDocuments();
});

// ════════════════════════════════════════════════
//  Search tab
// ════════════════════════════════════════════════
document.getElementById('searchThreshold').addEventListener('input', e => {
  document.getElementById('thresholdVal').textContent = parseFloat(e.target.value).toFixed(2);
});

async function doSearch() {
  const q = document.getElementById('searchQuery').value.trim();
  if (!q) return;

  const params = new URLSearchParams({ q });
  const st  = document.getElementById('searchSourceType').value;
  const cn  = document.getElementById('searchCaseNumber').value;
  const thr = document.getElementById('searchThreshold').value;
  const lim = document.getElementById('searchLimit').value;

  if (st) params.set('source_type', st);
  if (cn) params.set('case_number', cn);
  params.set('threshold', thr);
  params.set('limit', lim);

  const resultsEl = document.getElementById('searchResults');
  resultsEl.innerHTML = `
    <div class="flex items-center gap-2 text-gray-400 text-sm">
      <div class="w-4 h-4 border-2 border-blue-400 border-t-transparent rounded-full animate-spin"></div>
      Searching…
    </div>`;

  const res = await apiFetch(`/api/search?${params}`, { headers: authHdr() });
  if (!res) return;

  const results = await res.json();

  if (results.error) {
    resultsEl.innerHTML = `<p class="text-red-500 text-sm">${results.error}</p>`;
    return;
  }

  if (results.length === 0) {
    resultsEl.innerHTML = '<p class="text-gray-400 text-sm">No results found. Try lowering the threshold or broadening your query.</p>';
    return;
  }

  resultsEl.innerHTML = results.map(r => `
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 mb-4">
      <div class="flex items-start justify-between gap-4 mb-1">
        <span class="font-semibold text-gray-800 text-sm truncate">${r.filename}</span>
        <span class="shrink-0 text-xs font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full">
          ${(r.similarity * 100).toFixed(1)}% match
        </span>
      </div>
      <p class="text-xs text-gray-400 mb-3">
        ${r.source_type}${r.case_number ? ' · ' + r.case_number : ''}${r.document_date ? ' · ' + r.document_date : ''}
      </p>
      <p class="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap">${r.content.slice(0, 600)}${r.content.length > 600 ? '…' : ''}</p>
    </div>
  `).join('');
}

document.getElementById('searchBtn').addEventListener('click', doSearch);
document.getElementById('searchQuery').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

// ════════════════════════════════════════════════
//  Init
// ════════════════════════════════════════════════
if (getToken()) {
  showApp();
} else {
  showLogin();
}
</script>
</body>
